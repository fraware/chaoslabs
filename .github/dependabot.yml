version: 2
updates:
  - package-ecosystem: gomod
    directory: "/controller"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: "/agent"
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: "/cli"
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: "/bench"
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: "/tests/integration"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/dashboard-v2"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/infrastructure"
    schedule:
      interval: weekly
