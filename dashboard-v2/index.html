<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/chaos-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ChaosLabs - Chaos Engineering Dashboard with Audit Pack Viewer" />
    <meta name="theme-color" content="#1f2937" />
    
    <!-- Preload critical resources -->
    <link rel="preload" as="font" href="/fonts/Inter-Regular.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="/fonts/Inter-Medium.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="/fonts/Inter-SemiBold.woff2" type="font/woff2" crossorigin>
    
    <!-- PWA support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ChaosLabs" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Performance hints -->
    <link rel="dns-prefetch" href="//api.chaoslabs.io" />
    <link rel="preconnect" href="//api.chaoslabs.io" />
    
    <title>ChaosLabs Dashboard</title>
    
    <!-- Inline critical CSS to prevent FOUC -->
    <style>
      /* Critical CSS for loading state */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f9fafb;
      }
      
      .loading-screen {
        position: fixed;
        inset: 0;
        background: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e5e7eb;
        border-top: 4px solid #0ea5e9;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide loading screen when app loads */
      .app-loaded .loading-screen {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div class="loading-screen">
      <div class="loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- Service worker registration -->
    <script>
      // Remove loading screen when React app mounts
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          document.body.classList.add('app-loaded');
        }, 100);
      });
      
      // Performance monitoring
      if ('performance' in window && 'getEntriesByType' in performance) {
        window.addEventListener('load', () => {
          setTimeout(() => {
            const navigation = performance.getEntriesByType('navigation')[0];
            const paint = performance.getEntriesByType('paint');
            
            console.log('Performance Metrics:');
            console.log('Time to Interactive:', navigation.loadEventEnd - navigation.fetchStart, 'ms');
            
            paint.forEach(entry => {
              console.log(entry.name + ':', entry.startTime, 'ms');
            });
          }, 1000);
        });
      }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
