run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - misspell
    - revive

linters-settings:
  staticcheck:
    checks: ["all", "-ST1000"]
  revive:
    rules:
      - name: blank-imports
      - name: time-naming
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
