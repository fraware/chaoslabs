version: "3.8"
services:
  controller:
    image: chaoslabs/chaos-controller:latest
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.controller.optimized
      target: production
    ports:
      - "8080:8080"
    depends_on:
      - agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/controller", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent:
    image: chaoslabs/chaos-agent:latest
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.agent.optimized
      target: production
    ports:
      - "9090:9090"
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    restart: unless-stopped

  dashboard:
    image: chaoslabs/chaos-dashboard:latest
    build:
      context: ./dashboard-v2
      dockerfile: ../infrastructure/Dockerfile.dashboard.optimized
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:8080
    restart: unless-stopped
